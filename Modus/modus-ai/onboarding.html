<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tell us about you — Modus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex flex-col">

<header class="px-6 py-6 flex items-center justify-between">
  <span class="font-display text-2xl">Modus<span style="color: var(--cobalt)">.</span></span>
  <button data-theme-toggle class="pill"><span data-theme-icon>☾</span></button>
</header>

<main class="flex-1 flex items-start justify-center px-6 pb-16 pt-6">
  <div class="w-full max-w-2xl">

    <section id="step-role">
      <p class="eyebrow mb-3"><span class="eyebrow-num">01</span>Two questions, then you're in</p>
      <h1 class="font-display text-3xl mb-6">What best describes you?</h1>
      <div id="role-grid" class="grid sm:grid-cols-2 gap-3 mb-6"></div>
      <div id="role-custom-wrap" class="hidden mb-6">
        <input id="role-custom" class="input-field" placeholder="Tell us your role">
      </div>
      <button id="role-next" class="btn-primary" disabled>Continue</button>
    </section>

    <section id="step-niche" class="hidden">
      <p class="eyebrow mb-3"><span class="eyebrow-num">02</span>Almost there</p>
      <h1 class="font-display text-3xl mb-6">What's your content niche?</h1>
      <div id="niche-grid" class="grid sm:grid-cols-2 gap-3 mb-6"></div>
      <div id="niche-custom-wrap" class="hidden mb-6">
        <input id="niche-custom" class="input-field" placeholder="Tell us your niche">
      </div>
      <div class="flex gap-3">
        <button id="niche-back" class="btn-secondary">Back</button>
        <button id="niche-finish" class="btn-primary" disabled>Enter Modus</button>
      </div>
    </section>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/ui.js"></script>
<script src="js/onboarding.js"></script>
</body>
</html>
